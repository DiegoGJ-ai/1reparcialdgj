name: Deploy to Surge

on:
  push:
    branches:
      - main  # Esto hace que se active cada vez que subes cambios a la rama main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Surge
        run: npm install --global surge

      - name: Desplegar a Surge
        env:
          SURGE_LOGIN: ${{ secrets.SURGE_LOGIN }}
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        # CAMBIA 'tu-nombre-unico.surge.sh' por algo inventado por ti (ej: miproye-123.surge.sh)
        run: surge ./ tu-nombre-unico.surge.sh