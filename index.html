<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Galáctico</title>
    <style>
        body {
            background-color: #0b0c10;
            color: #c5c6c7;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        h1 {
            font-size: 4rem;
            color: #66fcf1;
            text-shadow: 0 0 10px #66fcf1, 0 0 20px #66fcf1, 0 0 40px #45a29e;
            animation: pulsate 2s infinite alternate;
        }
        @keyframes pulsate {
            100% {
                text-shadow: 0 0 20px #66fcf1, 0 0 30px #45a29e, 0 0 50px #45a29e;
            }
        }
    </style>
</head>
<body>
    <h1>¡Despliegue Exitoso!</h1>
</body>
</html>
